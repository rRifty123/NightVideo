<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NightVideo</title>
    <style>
        :root {
            --bg-color: #0a051b;
            --neon-pink: #ff007f;
            --neon-purple: #8a2be2;
            --neon-blue: #00f0ff;
            --text-color: #ffffff;
            --card-bg: rgba(20, 10, 35, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Starry Background Effect */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
        }

        #app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: rgba(10, 5, 27, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid var(--neon-purple);
            box-shadow: 0 0 20px var(--neon-purple);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .screen {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        /* Auth Screen */
        #auth-screen {
            justify-content: center;
            align-items: center;
            padding: 20px;
            height: 100%;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--neon-pink);
            box-shadow: 0 0 15px var(--neon-pink);
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            text-align: center;
        }

        h1.logo {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-purple);
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            color: white;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 8px var(--neon-blue);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-purple));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-pink);
            margin-top: 10px;
        }

        .toggle-auth {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--neon-blue);
            cursor: pointer;
        }

        /* Header */
        .header {
            padding: 15px;
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* Video Grid */
        .video-grid {
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }

        .video-thumbnail {
            width: 100%;
            height: 110px;
            background: #000;
            object-fit: cover;
        }

        .video-info {
            padding: 8px;
        }

        .video-title {
            font-size: 0.9rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Navbar */
        .navbar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 65px;
            background: #050211;
            border-top: 2px solid var(--neon-purple);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
        }

        .nav-item {
            color: #888;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-item.active {
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .nav-item span {
            font-size: 0.65rem;
            margin-top: 2px;
        }

        .nav-item.plus-btn {
            color: var(--neon-blue);
            font-size: 1.8rem;
        }

        /* Custom Player Screen */
        #player-screen {
            background: #000;
            z-index: 20;
        }

        .player-header {
            padding: 10px;
            background: rgba(0,0,0,0.5);
        }

        .back-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--neon-pink);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
        }

        .main-video-element {
            width: 100%;
            height: 230px;
            background: #000;
        }

        /* Custom Progress Bars */
        .custom-progress-container {
            width: 100%;
            height: 10px;
            background-color: var(--neon-purple);
            position: relative;
            cursor: pointer;
        }

        .custom-progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--neon-pink);
        }

        .player-details {
            padding: 15px;
            flex: 1;
            overflow-y: auto;
        }

        .engagement-row {
            display: flex;
            gap: 15px;
            margin: 15px 0;
        }

        .like-dislike-btn {
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
        }

        .like-dislike-btn.active {
            border-color: var(--neon-pink);
            box-shadow: 0 0 8px var(--neon-pink);
        }

        .comment-item {
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        /* Scrolls Setup */
        #scrolls-screen {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100%;
            padding-bottom: 65px;
        }

        .scroll-container {
            width: 100%;
            height: calc(100vh - 65px);
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }

        .scroll-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scroll-overlay {
            position: absolute;
            bottom: 30px;
            left: 15px;
            right: 80px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.9);
        }

        .scroll-sidebar {
            position: absolute;
            right: 15px;
            bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .sidebar-icon {
            width: 45px;
            height: 45px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--neon-pink);
            cursor: pointer;
        }

        /* Profile Header */
        .profile-header {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .profile-pic {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
            object-fit: cover;
        }
    </style>
</head>
<body>

<div id="app-container">

    <div id="auth-screen" class="screen active">
        <div class="auth-card">
            <h1 class="logo">NightVideo</h1>
            <h3 id="auth-title" style="margin-bottom:15px;">Create Account</h3>
            <input type="text" id="auth-username" placeholder="Username">
            <input type="password" id="auth-password" placeholder="Password">
            <button id="auth-submit-btn">Sign Up</button>
            <div class="toggle-auth" id="auth-toggle">Already have an account? Log In</div>
        </div>
    </div>

    <div id="home-screen" class="screen">
        <div class="header">
            <h2 class="logo" style="font-size: 1.5rem; margin-bottom: 10px;">NightVideo</h2>
            <input type="text" id="search-bar" placeholder="🔍 Search for videos...">
        </div>
        <div class="video-grid" id="home-video-grid"></div>
    </div>

    <div id="scrolls-screen" class="screen"></div>

    <div id="post-screen" class="screen" style="padding: 20px;">
        <h2 style="color: var(--neon-blue); margin-bottom: 20px;">Post Content</h2>
        <input type="text" id="post-title" placeholder="Video Title...">
        <select id="post-type">
            <option value="normal">Normal Video</option>
            <option value="scroll">Scroll (Vertical Short)</option>
        </select>
        <input type="text" id="post-url" placeholder="Video URL (or leave blank for sample)">
        <button id="submit-post-btn">Publish Post</button>
    </div>

    <div id="liked-screen" class="screen">
        <div class="header"><h2>Liked Content</h2></div>
        <div class="video-grid" id="liked-video-grid"></div>
    </div>

    <div id="profile-screen" class="screen">
        <div class="profile-header">
            <img id="user-avatar" class="profile-pic" src="https://api.dicebear.com/7.x/bottts/svg?seed=Night" onclick="changePfp()">
            <h2 id="profile-username-heading" style="margin-top:10px;">@User</h2>
            <button onclick="changeUsername()" style="width:auto; padding:5px 10px; font-size:0.8rem; margin-top:5px;">Edit Username</button>
        </div>
        <h3 style="padding:15px 15px 0; color:var(--neon-pink)">Your Uploads</h3>
        <div class="video-grid" id="profile-video-grid"></div>
    </div>

    <div id="player-screen" class="screen">
        <div class="player-header">
            <button class="back-btn" id="player-back-btn">⬅ Back</button>
        </div>
        <video id="main-player-element" class="main-video-element" autoplay controlslist="nodownload"></video>
        
        <div class="custom-progress-container" id="custom-progress-container">
            <div class="custom-progress-bar" id="custom-progress-bar"></div>
        </div>

        <div class="player-details">
            <h2 id="player-video-title">Title</h2>
            <p id="player-video-author" style="color:#aaa;">by author</p>
            <div class="engagement-row">
                <button class="like-dislike-btn" id="player-like-btn">👍 Like</button>
                <button class="like-dislike-btn" id="player-dislike-btn">👎 Dislike</button>
            </div>
            <div style="margin-top:20px;">
                <h3>Comments</h3>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <input type="text" id="new-comment-input" placeholder="Add a comment..." style="margin:0;">
                    <button id="submit-comment-btn" style="width:auto; margin:0; padding:0 15px;">Post</button>
                </div>
                <div id="comments-container" style="margin-top:10px;"></div>
            </div>
        </div>
    </div>

    <div class="navbar" id="main-navbar" style="display:none;">
        <div class="nav-item active" onclick="switchTab('home')">🏠<span>Home</span></div>
        <div class="nav-item" onclick="switchTab('scrolls')">📱<span>Scrolls</span></div>
        <div class="nav-item plus-btn" onclick="switchTab('post')">➕</div>
        <div class="nav-item" onclick="switchTab('liked')">❤️<span>Liked</span></div>
        <div class="nav-item" onclick="switchTab('profile')">👤<span>Profile</span></div>
    </div>

</div>

<script>
    // System Data Initialization
    let users = JSON.parse(localStorage.getItem('nv_users')) || {};
    let videos = JSON.parse(localStorage.getItem('nv_videos')) || [
        { id: "1", title: "Retro Midnight Neon Drive", type: "normal", url: "https://vjs.zencdn.net/v/oceans.mp4", author: "CyberDrive", likedBy: [], comments: [] },
        { id: "2", title: "Lo-Fi Beats for Coding", type: "normal", url: "https://www.w3schools.com/html/mov_bbb.mp4", author: "VaporWaver", likedBy: [], comments: [] },
        { id: "3", title: "Neon Tokyo Aesthetic #shorts", type: "scroll", url: "https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-sign-lighting-39934-large.mp4", author: "TokyoVibes", likedBy: [], comments: [] },
        { id: "4", title: "Amazing Light Show!", type: "scroll", url: "https://assets.mixkit.co/videos/preview/mixkit-tunnel-of-futuristic-blue-lights-42289-large.mp4", author: "GlowMaster", likedBy: [], comments: [] }
    ];

    let currentUser = null;
    let isLoginMode = false;
    let activeVideo = null;

    // Save helpers
    function saveAll() {
        localStorage.setItem('nv_users', JSON.stringify(users));
        localStorage.setItem('nv_videos', JSON.stringify(videos));
    }

    // Auth Actions
    const authToggle = document.getElementById('auth-toggle');
    const authTitle = document.getElementById('auth-title');
    const authBtn = document.getElementById('auth-submit-btn');

    authToggle.addEventListener('click', () => {
        isLoginMode = !isLoginMode;
        authTitle.innerText = isLoginMode ? "Welcome Back" : "Create Account";
        authBtn.innerText = isLoginMode ? "Log In" : "Sign Up";
        authToggle.innerText = isLoginMode ? "Don't have an account? Sign Up" : "Already have an account? Log In";
    });

    authBtn.addEventListener('click', () => {
        const username = document.getElementById('auth-username').value.trim();
        const password = document.getElementById('auth-password').value.trim();

        if(!username || !password) return alert("Please fill out all spaces.");

        if(isLoginMode) {
            if(users[username] && users[username].password === password) {
                login(username);
            } else {
                alert("Incorrect username or password.");
            }
        } else {
            if(users[username]) return alert("Username already taken!");
            users[username] = { username, password, pfp: `https://api.dicebear.com/7.x/bottts/svg?seed=${username}` };
            saveAll();
            login(username);
        }
    });

    function login(username) {
        currentUser = users[username];
        document.getElementById('auth-screen').classList.remove('active');
        document.getElementById('main-navbar').style.display = 'flex';
        updateProfileUI();
        switchTab('home');
    }

    function updateProfileUI() {
        document.getElementById('user-avatar').src = currentUser.pfp;
        document.getElementById('profile-username-heading').innerText = `@${currentUser.username}`;
    }

    // Tab Handling
    window.switchTab = function(tabName) {
        document.getElementById('main-player-element').pause();
        document.querySelectorAll('.scroll-video').forEach(v => v.pause());
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

        document.getElementById(`${tabName}-screen`).classList.add('active');
        
        // Tab indicator update
        const idx = ['home','scrolls','post','liked','profile'].indexOf(tabName);
        document.querySelectorAll('.nav-item')[idx].classList.add('active');

        if(tabName === 'home' || tabName === 'liked' || tabName === 'profile') renderGrids();
        if(tabName === 'scrolls') renderScrolls();
    };

    // Render Feeds
    function renderGrids() {
        const homeGrid = document.getElementById('home-video-grid');
        const likedGrid = document.getElementById('liked-video-grid');
        const profileGrid = document.getElementById('profile-video-grid');
        const search = document.getElementById('search-bar').value.toLowerCase();

        homeGrid.innerHTML = ''; likedGrid.innerHTML = ''; profileGrid.innerHTML = '';

        videos.forEach(v => {
            if(v.type !== 'normal') return;
            if(search && !v.title.toLowerCase().includes(search)) return;

            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <div style="width:100%; height:110px; background:#000; display:flex; align-items:center; justify-content:center; font-size:2rem;">🎬</div>
                <div class="video-info">
                    <div class="video-title">${v.title}</div>
                    <div style="font-size:0.75rem; color:#aaa;">@${v.author}</div>
                </div>
            `;
            card.onclick = () => openPlayer(v);

            homeGrid.appendChild(card.cloneNode(true).onclick = () => openPlayer(v));
            if(v.likedBy.includes(currentUser.username)) likedGrid.appendChild(card.cloneNode(true).onclick = () => openPlayer(v));
            if(v.author === currentUser.username) profileGrid.appendChild(card.cloneNode(true).onclick = () => openPlayer(v));
        });
    }

    document.getElementById('search-bar').addEventListener('input', renderGrids);

    function renderScrolls() {
        const scr = document.getElementById('scrolls-screen');
        scr.innerHTML = '';
        videos.forEach(v => {
            if(v.type !== 'scroll') return;
            const container = document.createElement('div');
            container.className = 'scroll-container';
            const hasLiked = v.likedBy.includes(currentUser.username);

            container.innerHTML = `
                <video class="scroll-video" src="${v.url}" loop playsinline></video>
                <div class="scroll-overlay"><h3>@${v.author}</h3><p>${v.title}</p></div>
                <div class="scroll-sidebar">
                    <div class="sidebar-icon" style="color:${hasLiked?'var(--neon-pink)':'white'}" onclick="toggleLike('${v.id}', true)">❤️</div>
                    <div style="font-size:0.8rem; margin-top:-10px;">${v.likedBy.length}</div>
                </div>
            `;
            
            const vid = container.querySelector('.scroll-video');
            container.onclick = () => vid.paused ? vid.play() : vid.pause();
            scr.appendChild(container);
        });

        // Simple visibility autoplay check
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                const video = e.target.querySelector('.scroll-video');
                if(video) e.isIntersecting ? video.play() : video.pause();
            });
        }, { threshold: 0.6 });
        document.querySelectorAll('.scroll-container').forEach(c => obs.observe(c));
    }

    // Video Posting
    document.getElementById('submit-post-btn').addEventListener('click', () => {
        const title = document.getElementById('post-title').value.trim();
        const type = document.getElementById('post-type').value;
        let url = document.getElementById('post-url').value.trim();

        if(!title) return alert("Please enter a title.");
        if(!url) url = type === 'normal' ? "https://vjs.zencdn.net/v/oceans.mp4" : "https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-sign-lighting-39934-large.mp4";

        videos.push({ id: String(Date.now()), title, type, url, author: currentUser.username, likedBy: [], comments: [] });
        saveAll();
        
        document.getElementById('post-title').value = '';
        document.getElementById('post-url').value = '';
        alert("Posted successfully!");
        switchTab('home');
    });

    // Custom Video Player Logic
    function openPlayer(video) {
        activeVideo = video;
        document.getElementById('player-screen').classList.add('active');
        const p = document.getElementById('main-player-element');
        p.src = video.url;
        p.play();

        document.getElementById('player-video-title').innerText = video.title;
        document.getElementById('player-video-author').innerText = `by @${video.author}`;
        
        updatePlayerEngagementUI();
        renderComments();
    }

    function updatePlayerEngagementUI() {
        const hasLiked = activeVideo.likedBy.includes(currentUser.username);
        document.getElementById('player-like-btn').classList.toggle('active', hasLiked);
        document.getElementById('player-like-btn').innerText = `👍 ${activeVideo.likedBy.length} Likes`;
    }

    // Custom Progress Tracker (Purple Bar/Pink Progress)
    const playerElement = document.getElementById('main-player-element');
    const progressBar = document.getElementById('custom-progress-bar');
    const progressContainer = document.getElementById('custom-progress-container');

    playerElement.addEventListener('timeupdate', () => {
        if(playerElement.duration) {
            progressBar.style.width = `${(playerElement.currentTime / playerElement.duration) * 100}%`;
        }
    });

    progressContainer.addEventListener('click', (e) => {
        const rect = progressContainer.getBoundingClientRect();
        playerElement.currentTime = ((e.clientX - rect.left) / rect.width) * playerElement.duration;
    });

    document.getElementById('player-back-btn').addEventListener('click', () => {
        playerElement.pause();
        document.getElementById('player-screen').classList.remove('active');
        renderGrids();
    });

    document.getElementById('player-like-btn').addEventListener('click', () => {
        toggleLike(activeVideo.id, false);
        updatePlayerEngagementUI();
    });

    document.getElementById('player-dislike-btn').addEventListener('click', function() {
        this.classList.toggle('active');
    });

    function toggleLike(id, refreshScrolls) {
        const v = videos.find(video => video.id === id);
        const idx = v.likedBy.indexOf(currentUser.username);
        if(idx > -1) v.likedBy.splice(idx, 1);
        else v.likedBy.push(currentUser.username);
        saveAll();
        if(refreshScrolls) renderScrolls();
    }

    // Comments Execution
    document.getElementById('submit-comment-btn').addEventListener('click', () => {
        const inp = document.getElementById('new-comment-input');
        if(!inp.value.trim()) return;
        activeVideo.comments.push({ user: currentUser.username, text: inp.value.trim() });
        saveAll();
        inp.value = '';
        renderComments();
    });

    function renderComments() {
        const container = document.getElementById('comments-container');
        container.innerHTML = '';
        activeVideo.comments.forEach(c => {
            const div = document.createElement('div');
            div.className = 'comment-item';
            div.innerHTML = `<strong>@${c.user}</strong>: ${c.text}`;
            container.appendChild(div);
        });
    }

    // Profile Edits
    window.changePfp = function() {
        const url = prompt("Enter profile image URL:", currentUser.pfp);
        if(url) { currentUser.pfp = url; users[currentUser.username].pfp = url; saveAll(); updateProfileUI(); }
    };

    window.changeUsername = function() {
        const name = prompt("Enter new username:", currentUser.username);
        if(name && name !== currentUser.username) {
            if(users[name]) return alert("Username taken!");
            
            // Migrate users references
            delete users[currentUser.username];
            currentUser.username = name;
            users[name] = currentUser;
            
            // Sync old videos
            videos.forEach(v => {
                if(v.author === name) v.author = name;
                v.likedBy = v.likedBy.map(u => u === name ? name : u);
            });
            
            saveAll();
            updateProfileUI();
            alert("Username changed!");
        }
    };
</script>
</body>
</html>
