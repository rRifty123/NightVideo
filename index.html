<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NightVideo</title>
    <style>
        :root {
            --bg-color: #0a051b;
            --neon-pink: #ff007f;
            --neon-purple: #8a2be2;
            --neon-blue: #00f0ff;
            --text-color: #ffffff;
            --card-bg: rgba(20, 10, 35, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Starry Background Effect */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
        }

        /* App Container mimicking a mobile view */
        #app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: rgba(10, 5, 27, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid var(--neon-purple);
            box-shadow: 0 0 20px var(--neon-purple);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Screens */
        .screen {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px;
            position: relative;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        /* Auth Screen */
        #auth-screen {
            justify-content: center;
            align-items: center;
            padding: 20px;
            height: 100%;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--neon-pink);
            box-shadow: 0 0 15px var(--neon-pink);
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            text-align: center;
        }

        h1.logo {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-purple);
            margin-bottom: 20px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            color: white;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 8px var(--neon-blue);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-purple));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-pink);
            margin-top: 10px;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        .toggle-auth {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--neon-blue);
            cursor: pointer;
        }

        /* Header / Search Bar */
        .header {
            padding: 15px;
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* Video Feed Grid */
        .video-grid {
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }

        .video-thumbnail {
            width: 100%;
            height: 110px;
            background: #000;
            object-fit: cover;
        }

        .video-info {
            padding: 8px;
        }

        .video-title {
            font-size: 0.9rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-author {
            font-size: 0.75rem;
            color: #aaa;
        }

        /* Navigation Bar */
        .navbar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 65px;
            background: #050211;
            border-top: 2px solid var(--neon-purple);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
        }

        .nav-item {
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-item.active {
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .nav-item span {
            font-size: 0.65rem;
            margin-top: 2px;
        }

        /* Plus Button Custom Glow */
        .nav-item.plus-btn {
            color: var(--neon-blue);
            font-size: 2rem;
        }
        .nav-item.plus-btn.active {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* Custom Video Player Detail Screen */
        #player-screen {
            background: #000;
            padding-bottom: 0;
            z-index: 20;
        }

        .player-header {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 30;
        }

        .back-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--neon-pink);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        .main-video-element {
            width: 100%;
            height: 250px;
            background: #000;
        }

        /* Custom Progress Bar styling requested */
        .custom-progress-container {
            width: 100%;
            height: 12px;
            background-color: var(--neon-purple); /* Purple background bar */
            position: relative;
            cursor: pointer;
        }

        .custom-progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--neon-pink); /* Pink progress bar */
            transition: width 0.1s linear;
        }

        .player-details {
            padding: 15px;
            background: var(--bg-color);
            flex: 1;
            overflow-y: auto;
        }

        .engagement-row {
            display: flex;
            gap: 20px;
            margin: 15px 0;
        }

        .like-dislike-btn {
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            width: auto;
            margin: 0;
            box-shadow: none;
        }
        .like-dislike-btn.active {
            border-color: var(--neon-pink);
            box-shadow: 0 0 8px var(--neon-pink);
        }

        .comments-section {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        .comment-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        /* Scrolls (TikTok Mode) */
        #scrolls-screen {
            padding-bottom: 65px;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100%;
        }

        .scroll-container {
            width: 100%;
            height: calc(100vh - 65px);
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }

        .scroll-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scroll-overlay {
            position: absolute;
            bottom: 20px;
            left: 15px;
            right: 80px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
            z-index: 5;
        }

        .scroll-sidebar {
            position: absolute;
            right: 15px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            z-index: 5;
        }

        .sidebar-icon {
            width: 45px;
            height: 45px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--neon-pink);
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* Profile Screen */
        .profile-header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .profile-pic-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .edit-pfp-label {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--neon-pink);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="app-container">

    <div id="auth-screen" class="screen active">
        <div class="auth-card">
            <h1 class="logo">NightVideo</h1>
            <h3 id="auth-title" style="margin-bottom:15px;">Create Account</h3>
            <input type="text" id="auth-username" placeholder="Username">
            <input type="password" id="auth-password" placeholder="Password">
            <button id="auth-submit-btn">Sign Up</button>
            <div class="toggle-auth" id="auth-toggle">Already have an account? Log In</div>
        </div>
    </div>

    <div id="home-screen" class="screen">
        <div class="header">
            <h2 class="logo" style="font-size: 1.5rem; margin-bottom: 10px;">NightVideo</h2>
            <input type="text" id="search-bar" placeholder="🔍 Search for videos...">
        </div>
        <div class="video-grid" id="home-video-grid">
            </div>
    </div>

    <div id="scrolls-screen" class="screen">
        </div>

    <div id="post-screen" class="screen" style="padding: 20px;">
        <h2 style="color: var(--neon-blue); margin-bottom: 20px; text-shadow: 0 0 5px var(--neon-blue);">Post Video Content</h2>
        <label>Video Title / Captions</label>
        <input type="text" id="post-title" placeholder="Enter an awesome title...">
        
        <label>Video Type</label>
        <select id="post-type">
            <option value="normal">Normal Video (Horizontal / Standard)</option>
            <option value="scroll">Scroll (Vertical / Short)</option>
        </select>

        <label>Video Source URL</label>
        <input type="text" id="post-url" placeholder="Paste .mp4 link (e.g. from imgur/web)">
        <p style="font-size:0.75rem; color:#aaa; margin-top:-5px; margin-bottom:15px;">* For testing, a sample URL will automatically be assigned if left blank.</p>

        <button id="submit-post-btn">🚀 Broadcast Post</button>
    </div>

    <div id="liked-screen" class="screen">
        <div class="header">
            <h2>Your Liked Content</h2>
        </div>
        <div class="video-grid" id="liked-video-grid">
            </div>
    </div>

    <div id="profile-screen" class="screen">
        <div class="profile-header">
            <div class="profile-pic-container">
                <img id="user-avatar" class="profile-pic" src="https://api.dicebear.com/7.x/bottts/svg?seed=Night" alt="Avatar">
                <label class="edit-pfp-label" onclick="editProfilePic()">✏️</label>
            </div>
            <h2 id="profile-username-heading">Username</h2>
            <button id="edit-username-btn" style="width: auto; padding: 5px 15px; font-size: 0.8rem; background: transparent; border: 1px solid var(--neon-blue); box-shadow: none; margin-top:5px;">Change Username</button>
        </div>
        <div style="padding: 15px;"><h3 style="color: var(--neon-pink)">Your Uploads</h3></div>
        <div class="video-grid" id="profile-video-grid">
            </div>
    </div>

    <div id="player-screen" class="screen">
        <div class="player-header">
            <button class="back-btn" id="player-back-btn">⬅ Back</button>
        </div>
        
        <video id="main-player-element" class="main-video-element" autoplay loops playsinline></video>
        
        <div class="custom-progress-container" id="custom-progress-container">
            <div class="custom-progress-bar" id="custom-progress-bar"></div>
        </div>

        <div class="player-details">
            <h2 id="player-video-title">Video Title</h2>
            <p id="player-video-author" style="color:#aaa; font-size:0.85rem;">by Creator</p>
            
            <div class="engagement-row">
                <button class="like-dislike-btn" id="player-like-btn">👍 <span id="like-count">0</span></button>
                <button class="like-dislike-btn" id="player-dislike-btn">👎 Dislike</button>
            </div>

            <div class="comments-section">
                <h3>Comments</h3>
                <div style="display:flex; gap: 10px; margin: 10px 0;">
                    <input type="text" id="new-comment-input" placeholder="Add a public comment..." style="margin:0;">
                    <button id="submit-comment-btn" style="width:auto; margin:0; padding: 0 15px;">Post</button>
                </div>
                <div id="comments-container">
                    </div>
            </div>
        </div>
    </div>

    <div class="navbar" id="main-navbar" style="display:none;">
        <div class="nav-item active" onclick="switchTab('home')">🏠<span>Home</span></div>
        <div class="nav-item" onclick="switchTab('scrolls')">📱<span>Scrolls</span></div>
        <div class="nav-item plus-btn" onclick="switchTab('post')">➕</div>
        <div class="nav-item" onclick="switchTab('liked')">❤️<span>Liked</span></div>
        <div class="nav-item" onclick="switchTab('profile')">👤<span>Profile</span></div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Your Explicit Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAPKDpEvaGN5f2spZNQMHER5JWiEQbnelQ",
        authDomain: "nightvideo-1bb6b.firebaseapp.com",
        projectId: "nightvideo-1bb6b",
        storageBucket: "nightvideo-1bb6b.firebasestorage.app",
        messagingSenderId: "640068625340",
        appId: "1:640068625340:web:91cd35b0f032ae1a36c1b9",
        measurementId: "G-G609MJ505E"
    };

    // Initialize Firebase & FireStore
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Global State management variables
    let currentUser = null;
    let isLoginMode = false;
    let allVideos = [];
    let currentPlayingVideoGlobal = null;

    // --- SAMPLE BACKUP VIDEOS (If database is empty) ---
    const sampleVideos = [
        { id: "v1", title: "Midnight City Lights Walk", type: "normal", url: "https://vjs.zencdn.net/v/oceans.mp4", author: "CyberTracer", likes: 12, likedBy: [] },
        { id: "v2", title: "Retro Vaporwave Drive", type: "normal", url: "https://www.w3schools.com/html/mov_bbb.mp4", author: "NeonRider", likes: 45, likedBy: [] },
        { id: "s1", title: "Insane skater tricks! #shorts", type: "scroll", url: "https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-sign-lighting-39934-large.mp4", author: "SkateFiend", likes: 231, likedBy: [] },
        { id: "s2", title: "POV: Tokyo Arcade Rooms 👾", type: "scroll", url: "https://assets.mixkit.co/videos/preview/mixkit-tunnel-of-futuristic-blue-lights-42289-large.mp4", author: "TokyoVibe", likes: 824, likedBy: [] }
    ];

    // --- APPLICATION BOOTING AND ROUTING SETUP ---
    window.addEventListener('DOMContentLoaded', () => {
        setupAuthEvents();
        setupNavigationAndPosting();
        setupCustomVideoPlayerControls();
    });

    // --- AUTHENTICATION FLOW (Firestore Emulated User Architecture) ---
    function setupAuthEvents() {
        const authToggle = document.getElementById('auth-toggle');
        const authTitle = document.getElementById('auth-title');
        const authBtn = document.getElementById('auth-submit-btn');
        
        authToggle.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authTitle.innerText = isLoginMode ? "Welcome Back" : "Create Account";
            authBtn.innerText = isLoginMode ? "Log In" : "Sign Up";
            authToggle.innerText = isLoginMode ? "Don't have an account? Sign Up" : "Already have an account? Log In";
        });

        authBtn.addEventListener('click', async () => {
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value.trim();

            if(!username || !password) return alert("Please fill out all identity spaces.");

            if(isLoginMode) {
                // Log-in emulation via database verification
                const userDoc = await getDoc(doc(db, "users", username));
                if(userDoc.exists() && userDoc.data().password === password) {
                    loginSuccess(userDoc.data());
                } else {
                    alert("Invalid Username or Password.");
                }
            } else {
                // Sign-up profile allocation
                const userDoc = await getDoc(doc(db, "users", username));
                if(userDoc.exists()) return alert("Username already preserved by another explorer.");

                const newUser = {
                    username: username,
                    password: password,
                    pfp: `https://api.dicebear.com/7.x/bottts/svg?seed=${username}`,
                    likedVideos: []
                };

                await setDoc(doc(db, "users", username), newUser);
                loginSuccess(newUser);
            }
        });
    }

    function loginSuccess(userData) {
        currentUser = userData;
        document.getElementById('auth-screen').classList.remove('active');
        document.getElementById('main-navbar').style.display = 'flex';
        
        // Setup initial profiles details
        document.getElementById('user-avatar').src = currentUser.pfp;
        document.getElementById('profile-username-heading').innerText = `@${currentUser.username}`;
        
        switchTab('home');
        syncContentFeed();
    }

    // --- CORE TAB CONTROLLER NAVIGATION ---
    window.switchTab = function(tabName) {
        // Pause all global active players
        document.getElementById('main-player-element').pause();
        const activeScrolls = document.querySelectorAll('.scroll-video');
        activeScrolls.forEach(v => v.pause());

        // Deactivate all screens and menu classes
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

        // Toggle requested views
        const targetedScreen = document.getElementById(`${tabName}-screen`);
        if(targetedScreen) targetedScreen.classList.add('active');

        // Design active highlighting element configuration matching
        const navItems = document.querySelectorAll('.nav-item');
        if(tabName === 'home') navItems[0].classList.add('active');
        if(tabName === 'scrolls') {
            navItems[1].classList.add('active');
            // Auto-play primary element in Scrolls view
            const firstScroll = document.querySelector('.scroll-video');
            if(firstScroll) firstScroll.play();
        }
        if(tabName === 'post') navItems[2].classList.add('active');
        if(tabName === 'liked') navItems[3].classList.add('active');
        if(tabName === 'profile') navItems[4].classList.add('active');

        if(tabName === 'home' || tabName === 'liked' || tabName === 'profile') {
            renderGrids();
        }
    }

    // --- CONTENT SYNCING & MANAGEMENT (FIRESTORE INTERACTION) ---
    async function syncContentFeed() {
        try {
            const querySnapshot = await getDocs(collection(db, "videos"));
            allVideos = [];
            querySnapshot.forEach((doc) => {
                allVideos.push({ id: doc.id, ...doc.data() });
            });

            if(allVideos.length === 0) {
                // If database is sterile, initialize with defaults
                allVideos = [...sampleVideos];
            }
        } catch(e) {
            console.log("Using local offline configuration data array defaults.", e);
            allVideos = [...sampleVideos];
        }
        renderGrids();
        renderScrollsFeed();
    }

    function renderGrids() {
        const homeGrid = document.getElementById('home-video-grid');
        const likedGrid = document.getElementById('liked-video-grid');
        const profileGrid = document.getElementById('profile-video-grid');
        const searchQuery = document.getElementById('search-bar').value.toLowerCase();

        // Clear containers
        homeGrid.innerHTML = '';
        likedGrid.innerHTML = '';
        profileGrid.innerHTML = '';

        allVideos.forEach(video => {
            if(video.type !== 'normal') return; // Grids hold standard horizontal format items

            // Search filtering mechanism
            if(searchQuery && !video.title.toLowerCase().includes(searchQuery)) return;

            // Generate Video Card HTML Architecture template
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <video class="video-thumbnail" src="${video.url}#t=1"></video>
                <div class="video-info">
                    <div class="video-title">${video.title}</div>
                    <div class="video-author">@${video.author}</div>
                </div>
            `;
            
            card.addEventListener('click', () => launchVideoPlayer(video));

            // Home Delivery Injection
            homeGrid.appendChild(card.cloneNode(true));

            // Populate Liked Feed Tab
            if(video.likedBy && video.likedBy.includes(currentUser.username)) {
                likedGrid.appendChild(card.cloneNode(true));
            }

            // Populate Self Creator Upload profile tab element
            if(video.author === currentUser.username) {
                profileGrid.appendChild(card.cloneNode(true));
            }
        });

        // Re-assign listeners to cloned node systems manually
        bindClicksToGridItems(homeGrid, 'normal');
        bindClicksToGridItems(likedGrid, 'liked');
        bindClicksToGridItems(profileGrid, 'profile');
    }

    function bindClicksToGridItems(gridContainer, mode) {
        const structuralCards = gridContainer.querySelectorAll('.video-card');
        let indexMap = 0;
        allVideos.forEach(video => {
            if(video.type !== 'normal') return;
            if(mode === 'liked' && (!video.likedBy || !video.likedBy.includes(currentUser.username))) return;
            if(mode === 'profile' && video.author !== currentUser.username) return;
            
            if(structuralCards[indexMap]) {
                structuralCards[indexMap].addEventListener('click', () => launchVideoPlayer(video));
                indexMap++;
            }
        });
    }

    function renderScrollsFeed() {
        const scrollsScreen = document.getElementById('scrolls-screen');
        scrollsScreen.innerHTML = '';

        allVideos.forEach(video => {
            if(video.type !== 'scroll') return;

            const container = document.createElement('div');
            container.className = 'scroll-container';
            
            const hasLiked = video.likedBy && video.likedBy.includes(currentUser.username);

            container.innerHTML = `
                <video class="scroll-video" src="${video.url}" loop playsinline></video>
                <div class="scroll-overlay">
                    <h3>@${video.author}</h3>
                    <p>${video.title}</p>
                </div>
                <div class="scroll-sidebar">
                    <div class="sidebar-icon scroll-like-btn" style="color: ${hasLiked ? 'var(--neon-pink)' : 'white'}">❤️</div>
                    <div style="font-size:0.75rem; margin-top:-15px; margin-bottom:10px;">${video.likes || 0}</div>
                    <div class="sidebar-icon">💬</div>
                </div>
            `;

            // Scrolling view video item optimization handling
            const videoElement = container.querySelector('.scroll-video');
            container.addEventListener('click', () => {
                if (videoElement.paused) {
                    videoElement.play();
                } else {
                    videoElement.pause();
                }
            });

            // Like execution for Scrolls
            container.querySelector('.scroll-like-btn').addEventListener('click', async (e) => {
                e.stopPropagation();
                await toggleLikeStatus(video);
                syncContentFeed();
            });

            scrollsScreen.appendChild(container);
        });

        // Setup Mutation intersection observers to handle auto switching dynamic execution matching TikTok architectures
        const observerOptions = { roughness: 0.1, threshold: 0.6 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const vid = entry.target.querySelector('.scroll-video');
                if(vid) {
                    if (entry.isIntersecting) {
                        vid.play().catch(err => console.log("Autoplay blocked configuration handled.", err));
                    } else {
                        vid.pause();
                    }
                }
            });
        }, observerOptions);

        document.querySelectorAll('.scroll-container').forEach(box => observer.observe(box));
    }

    // --- NAVIGATION AND CREATION HANDLING SETUP ---
    function setupNavigationAndPosting() {
        // Search Event Triggering
        document.getElementById('search-bar').addEventListener('input', renderGrids);

        // Upload Creator Logic implementation setup
        document.getElementById('submit-post-btn').addEventListener('click', async () => {
            const title = document.getElementById('post-title').value.trim();
            const type = document.getElementById('post-type').value;
            let url = document.getElementById('post-url').value.trim();

            if(!title) return alert("Content details lack structural identification titles.");
            
            // Assign dummy falls backup video if empty
            if(!url) {
                url = type === 'normal' 
                    ? "https://vjs.zencdn.net/v/oceans.mp4" 
                    : "https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-sign-lighting-39934-large.mp4";
            }

            const payload = {
                title: title,
                type: type,
                url: url,
                author: currentUser.username,
                likes: 0,
                likedBy: [],
                comments: []
            };

            try {
                await addDoc(collection(db, "videos"), payload);
                alert("Broadcast successfully compiled to NightVideo network matrix!");
                // Clear input form details safely
                document.getElementById('post-title').value = '';
                document.getElementById('post-url').value = '';
                syncContentFeed();
                switchTab('home');
            } catch(e) {
                // Fail-safe injection emulation locally if rules permissions drop off network bounds
                allVideos.push({ id: "custom_" + Date.now(), ...payload });
                alert("Local transmission compiled.");
                switchTab('home');
            }
        });
    }

    // --- CUSTOM DESIGN INTUITIVE VIDEO PLAYER LAYER CONTROLS ---
    function launchVideoPlayer(video) {
        currentPlayingVideoGlobal = video;
        document.getElementById('player-screen').classList.add('active');
        
        const player = document.getElementById('main-player-element');
        player.src = video.url;
        player.play();

        document.getElementById('player-video-title').innerText = video.title;
        document.getElementById('player-video-author').innerText = `by @${video.author}`;
        document.getElementById('like-count').innerText = video.likes || 0;

        // Verify tracking state colors
        const hasLiked = video.likedBy && video.likedBy.includes(currentUser.username);
        document.getElementById('player-like-btn').classList.toggle('active', hasLiked);

        renderCommentsView(video);
    }

    function setupCustomVideoPlayerControls() {
        const player = document.getElementById('main-player-element');
        const progressBar = document.getElementById('custom-progress-bar');
        const progressContainer = document.getElementById('custom-progress-container');

        // Sync native playback runtime into custom pink / purple layout bar rendering
        player.addEventListener('timeupdate', () => {
            if(player.duration) {
                const percentage = (player.currentTime / player.duration) * 100;
                progressBar.style.width = `${percentage}%`;
            }
        });

        // Click on track bar updates play positions
        progressContainer.addEventListener('click', (e) => {
            const widthOffset = progressContainer.getBoundingClientRect().width;
            const clickPositionX = e.offsetX;
            if(player.duration) {
                player.currentTime = (clickPositionX / widthOffset) * player.duration;
            }
        });

        // Back action escape route configuration routing setup
        document.getElementById('player-back-btn').addEventListener('click', () => {
            player.pause();
            document.getElementById('player-screen').classList.remove('active');
        });

        // Like Execution Core implementation architecture mapping updates
        document.getElementById('player-like-btn').addEventListener('click', async () => {
            if(!currentPlayingVideoGlobal) return;
            await toggleLikeStatus(currentPlayingVideoGlobal);
            document.getElementById('like-count').innerText = currentPlayingVideoGlobal.likes;
            document.getElementById('player-like-btn').classList.toggle('active', currentPlayingVideoGlobal.likedBy.includes(currentUser.username));
        });

        // Dislike basic toggling interaction visual layout configuration handling
        const dislikeBtn = document.getElementById('player-dislike-btn');
        dislikeBtn.addEventListener('click', () => {
            dislikeBtn.classList.toggle('active');
        });

        // Commentary Posting Systems processing allocation loops mappings
        document.getElementById('submit-comment-btn').addEventListener('click', async () => {
            const text = document.getElementById('new-comment-input').value.trim();
            if(!text || !currentPlayingVideoGlobal) return;

            const commentObj = {
                user: currentUser.username,
                text: text
            };

            if(!currentPlayingVideoGlobal.comments) currentPlayingVideoGlobal.comments = [];
            currentPlayingVideoGlobal.comments.push(commentObj);

            // Attempt cloud persistence mapping
            try {
                const targetDocRef = doc(db, "videos", currentPlayingVideoGlobal.id);
                await updateDoc(targetDocRef, {
                    comments: arrayUnion(commentObj)
                });
            } catch(e) { console.log("Database write mutation dropped, operating local storage runtime adjustments."); }

            document.getElementById('new-comment-input').value = '';
            renderCommentsView(currentPlayingVideoGlobal);
        });
    }

    async function toggleLikeStatus(video) {
        if(!video.likedBy) video.likedBy = [];
        const index = video.likedBy.indexOf(currentUser.username);

        if(index > -1) {
            video.likedBy.splice(index, 1);
            video.likes = Math.max(0, video.likes - 1);
        } else {
            video.likedBy.push(currentUser.username);
            video.likes = (video.likes || 0) + 1;
        }

        try {
            const targetDocRef = doc(db, "videos", video.id);
            await updateDoc(targetDocRef, {
                likes: video.likes,
                likedBy: video.likedBy
            });
        } catch(e) { console.log("Database connection variable execution fault.", e); }
    }

    function renderCommentsView(video) {
        const box = document.getElementById('comments-container');
        box.innerHTML = '';
        if(!video.comments || video.comments.length === 0) {
            box.innerHTML = `<p style="font-size:0.8rem; color:#666;">No interactions here yet. Write the first note!</p>`;
            return;
        }
        video.comments.forEach(c => {
            const line = document.createElement('div');
            line.className = 'comment-item';
            line.innerHTML = `<strong>@${c.user}</strong>: <span>${c.text}</span>`;
            box.appendChild(line);
        });
    }

    // --- USER SETTING PROFILES MUTATION MODULES SPECIFICS ---
    window.editProfilePic = function() {
        const newUrl = prompt("Enter new Profile Image URL link location path:", currentUser.pfp);
        if(newUrl) {
            currentUser.pfp = newUrl;
            document.getElementById('user-avatar').src = newUrl;
            try { updateDoc(doc(db, "users", currentUser.username), { pfp: newUrl }); } catch(e){}
        }
    }

    document.getElementById('edit-username-btn').addEventListener('click', async () => {
        const nextName = prompt("Enter alternative username moniker title profile reference mapping:", currentUser.username);
        if(nextName && nextName !== currentUser.username) {
            alert("Profile metadata tag identifier appended successfully!");
            currentUser.username = nextName;
            document.getElementById('profile-username-heading').innerText = `@${nextName}`;
        }
    });

</script>
